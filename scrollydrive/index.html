<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />
<title>Scrollytelling Template</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src='https://api.tiles.mapbox.com/mapbox-gl-js/v2.0.0/mapbox-gl.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox-gl-js/v2.0.0/mapbox-gl.css' rel='stylesheet' />
<script>
// Loaded lazily once config.googlePlacesKey is known (see bottom of body)
function loadGooglePlaces(key) {
    if (!key) return;
    var s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places&v=beta';
    document.head.appendChild(s);
}
</script>
<script src="https://unpkg.com/intersection-observer@0.5.1/intersection-observer.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src='https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js'></script>
<script src="https://unpkg.com/scrollama"></script>
<style>
body {
margin:0; 
padding:0; 
font-family: sans-serif;
        }
a, a:hover, a:visited {
color: #0071bc;
        }
#map {
top:0; 
height: 100vh;
width:100vw;
position: fixed;
z-index: -5;
        }
#header {
margin: 3vh auto;
width: 90vw;
padding: 2vh;
text-align: center;
display:none;
        }
#footer {
width: 100%;
min-height: 5vh;
padding-top: 2vh;
padding-bottom: 2vh;
text-align: center;
line-height: 25px;
font-size: 13px;
        }
#features {
padding-top: 10vh;
padding-bottom: 10vh;
z-index: 100;
        }
.centered {
width: 50vw;
margin: 0 auto;
        }
.lefty {
width: 33vw;
margin-left: 5vw;
        }
.righty {
width: 33vw;
margin-left: 62vw;
        }
.light {
color: #444;
background-color: #fafafa;
        }
.dark {
color: #fafafa;
background-color: #444;
        }
.step {
padding-bottom: 50vh;
/* margin-bottom: 10vh; */
opacity: 0.25;
        }
.step.active {
opacity: 0.9;
        }
.step div {
padding:  25px 50px;
line-height: 25px;
font-size: 13px;
        }
.step img {
width: 100%;
        }
@media (max-width: 750px) {
#features {
width: 90vw;
margin: 0 auto;
            }
        }

/* ── Radiating puck markers ── */
.puck-marker {
    width: 24px;
    height: 24px;
    position: relative;
    cursor: pointer;
}
.puck-core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #c0392b;
    z-index: 2;
    box-shadow: 0 0 0 2px #fff;
}
.puck-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(192, 57, 43, 0.45);
    animation: puck-radiate 2.2s ease-out infinite;
    z-index: 1;
}
.puck-ring-delay { animation-delay: 1.1s; }
@keyframes puck-radiate {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
}

/* ── Restaurant popup tooltip ── */
.restaurant-popup .mapboxgl-popup-content {
    padding: 0;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.22);
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.restaurant-popup .mapboxgl-popup-close-button {
    color: #fff;
    font-size: 20px;
    padding: 4px 8px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    z-index: 2;
}
.tip-inner { background: #fff; }
.tip-photo {
    width: 100%; height: 160px;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
}
.tip-photo-placeholder {
    width: 100%; height: 160px;
    background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #999;
    font-style: italic;
}
.tip-body {
    padding: 14px 16px 16px;
}
.tip-name {
    font-weight: 700;
    font-size: 16px;
    color: #1a1a1a;
    margin: 0 0 8px;
    line-height: 1.25;
}
.tip-greek {
    font-size: 12.5px;
    line-height: 1.55;
    color: #555;
    margin: 0;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="story"></div>
<script src="./config.js"></script>
<script src="./js/drive.js"></script>
<script>
var layerTypes = {
'fill': ['fill-opacity'],
'line': ['line-opacity'],
'circle': ['circle-opacity', 'circle-stroke-opacity'],
'symbol': ['icon-opacity', 'text-opacity'],
'raster': ['raster-opacity'],
'fill-extrusion': ['fill-extrusion-opacity']
}
var alignments = {
'left': 'lefty',
'center': 'centered',
'right': 'righty'
}
function getLayerPaintType(layer) {
var layerType = map.getLayer(layer).type;
return layerTypes[layerType];
}
function setLayerOpacity(layer) {
var paintProps = getLayerPaintType(layer.layer);
paintProps.forEach(function(prop) {
map.setPaintProperty(layer.layer, prop, layer.opacity);
    });
}
var story = document.getElementById('story');
var features = document.createElement('div');
features.classList.add(alignments[config.alignment]);
features.setAttribute('id', 'features');
var header = document.createElement('div');
if (config.title) {
var titleText = document.createElement('h1');
titleText.innerText = config.title;
header.appendChild(titleText);
}
if (config.subtitle) {
var subtitleText = document.createElement('h2');
subtitleText.innerText = config.subtitle;
header.appendChild(subtitleText);
}
if (config.byline) {
var bylineText = document.createElement('p');
bylineText.innerText = config.byline;
header.appendChild(bylineText);
}
if (header.innerText.length > 0) {
header.classList.add(config.theme);
header.setAttribute('id', 'header');
story.appendChild(header);
}
config.chapters.forEach((record, idx) => {
var container = document.createElement('div');
var chapter = document.createElement('div');
if (record.title) {
var title = document.createElement('h3');
title.innerText = record.title;
chapter.appendChild(title);
    }
if (record.image) {
var image = new Image();  
image.src = record.image;  
chapter.appendChild(image);
    }
if (record.description) {
var story = document.createElement('p');
story.innerHTML = record.description;
chapter.appendChild(story);
    }
container.setAttribute('id', record.id);
container.classList.add('step');
if (idx === 0) {
container.classList.add('active');
    }
chapter.classList.add(config.theme);
container.appendChild(chapter);
features.appendChild(container);
});
story.appendChild(features);
var footer = document.createElement('div');
if (config.footer) {
var footerText = document.createElement('p');
footerText.innerHTML = config.footer;
footer.appendChild(footerText);
}
if (footer.innerText.length > 0) {
footer.classList.add(config.theme);
footer.setAttribute('id', 'footer');
story.appendChild(footer);
}
mapboxgl.accessToken = config.accessToken;
const transformRequest = (url) => {
const hasQuery = url.indexOf("?") !== -1;
const suffix = hasQuery ? "&pluginName=scrollytellingV2" : "?pluginName=scrollytellingV2";
return {
url: url + suffix
    }
}
var map = new mapboxgl.Map({
container: 'map',
style: config.style,
scrollZoom: false,
transformRequest: transformRequest
});
var marker = new mapboxgl.Marker();
if (config.showMarkers) {
marker.setLngLat(config.chapters[0].location.center).addTo(map);
}
var scroller = scrollama();
function handleStepProgress(response) {
if (response.element.id.slice(0,5) !== 'drive') return;
if (geojsonPoint.features[0].geometry.coordinates.length === 0) return;
let driveSlideNum = parseInt(response.element.id.slice(-1));
if (map.getLayer('animatedLine')) {
    map.setLayoutProperty('animatedLine', 'visibility', 'visible');
}
let stepProgress = Math.round(response.progress*driveSmoothness + driveSmoothness*driveSlideNum);
changeCenter(stepProgress);
}
var mapLoaded = false;
var routesLoaded = false;
function initializeStory() {
if (!mapLoaded || !routesLoaded) return;
var w = window.innerWidth;
var allCoords = routesData.reduce(function(acc, r) {
return acc.concat(r.geometry.coordinates);
    }, []);
if (followPoint === false) {
var bounds = allCoords.reduce(function(b, coord) {
return b.extend(coord);
        }, new mapboxgl.LngLatBounds(allCoords[0], allCoords[0]));
map.fitBounds(bounds, {
padding: w >= 500 ? {top: 150, bottom: 150, right: -100, left: 200} : 20,
duration: 0
        });
    } else {
map.setZoom(followZoomLevel);
map.setBearing(followBearing);
map.setPitch(followPitch);
    }
map.addSource('lineSource', { type: 'geojson', data: geojsonPoint });
map.addSource('pointSource', { type: 'geojson', data: geojsonPoint });
map.addLayer({
id: 'animatedLine',
type: 'line',
source: 'lineSource',
paint: { 'line-opacity': 0.8, 'line-color': '#000000', 'line-width': 8, 'line-blur': 1 },
layout: { visibility: 'none' }
    });
map.addLayer({
id: 'animatedPoint',
type: 'circle',
source: 'pointSource',
paint: { 'circle-radius': 6, 'circle-opacity': 1, 'circle-color': '#c0392b', 'circle-stroke-color': '#fff', 'circle-stroke-width': 2 }
    });
addRouteLayers();
scroller
    .setup({ step: '.step', offset: 0.5, progress: true })
    .onStepEnter(response => {
var chapter = config.chapters.find(chap => chap.id === response.element.id);
response.element.classList.add('active');
if (config.showMarkers) {
marker.setLngLat(chapter.location.center);
        }
if (chapter.onChapterEnter.length > 0) {
chapter.onChapterEnter.forEach(setLayerOpacity);
        }
    })
    .onStepExit(response => {
var chapter = config.chapters.find(chap => chap.id === response.element.id);
response.element.classList.remove('active');
if (chapter.onChapterExit.length > 0) {
chapter.onChapterExit.forEach(setLayerOpacity);
        }
    })
    .onStepProgress(handleStepProgress);
createLine();
}
fetchRealRoutes(config.accessToken)
    .then(function(routes) {
        routesLoaded = true;
        initializeStory();
    })
    .catch(function(err) { console.error('Error loading routes:', err); });
map.on('load', function() {
mapLoaded = true;
initializeStory();
});
window.addEventListener('resize', scroller.resize);

// Load Google Places API once config is available
loadGooglePlaces(config.googlePlacesKey);

// ── Iframe scroll bridge ──────────────────────────────────────────────────
// Parent page sends scroll progress via postMessage so the animation
// fires even if the user scrolls the outer article rather than the iframe.
(function() {
    window.addEventListener('message', function(evt) {
        if (!evt.data || evt.data.type !== 'scrollydrive-progress') return;
        if (geojsonPoint.features[0].geometry.coordinates.length === 0) return;
        if (!map.getLayer('animatedLine')) return;

        var ratio = Math.max(0, Math.min(1, evt.data.ratio));
        var totalDrive = driveSlides * driveSmoothness;
        var idx = Math.round(ratio * totalDrive);

        var slideNum = Math.min(Math.floor(ratio * driveSlides), driveSlides - 1);
        document.querySelectorAll('.step').forEach(function(el) { el.classList.remove('active'); });
        var target = document.getElementById('drive-slide-' + slideNum);
        if (target) target.classList.add('active');

        map.setLayoutProperty('animatedLine', 'visibility', 'visible');
        changeCenter(idx);
    });
})();
</script>
</body>
</html>
